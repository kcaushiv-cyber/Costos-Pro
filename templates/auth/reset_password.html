<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña — Costos Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-overlay"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">CP</div>
      <h1>Restablecer contraseña</h1>
      <p>Ingresa una nueva contraseña para tu cuenta</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'error' if category in ('error','danger') else category }}" style="margin-bottom:16px">
            <i class="ti ti-{{ 'check' if category == 'success' else 'alert-circle' }}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
      <div class="form-group">
        <label class="form-label" for="password">
          <i class="ti ti-lock" style="font-size:14px;vertical-align:-1px"></i>
          Nueva contraseña
        </label>
        <div class="password-field">
          <input type="password" id="password" name="password"
                 class="form-control" placeholder="Mínimo 8 caracteres"
                 required minlength="8" autocomplete="new-password">
          <button type="button" class="password-toggle"
                  onclick="togglePassword('password', this)"
                  aria-label="Mostrar contraseña">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">
          <i class="ti ti-lock-check" style="font-size:14px;vertical-align:-1px"></i>
          Confirmar contraseña
        </label>
        <div class="password-field">
          <input type="password" id="confirm_password" name="confirm_password"
                 class="form-control" placeholder="Repite la contraseña"
                 required minlength="8" autocomplete="new-password">
          <button type="button" class="password-toggle"
                  onclick="togglePassword('confirm_password', this)"
                  aria-label="Mostrar contraseña">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" style="justify-content:center;padding:12px">
        <i class="ti ti-key"></i>
        Guardar nueva contraseña
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)">
      ¿Ya recordaste tu contraseña?
      <a href="{{ url_for('auth.login') }}" style="color:var(--primary);font-weight:500">
        Iniciar sesión
      </a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.querySelector('i').className = isText ? 'ti ti-eye' : 'ti ti-eye-off';
  }
</script>
</body>
</html>
