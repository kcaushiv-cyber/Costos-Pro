<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña — Costos Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-overlay"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">CP</div>
      <h1>Costos Pro</h1>
      <p>Recupera el acceso a tu cuenta</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{ 'error' if cat in ('error','danger') else cat }}" style="margin-bottom:12px">
          <i class="ti ti-{{ 'check' if cat == 'success' else 'alert-circle' }}"></i>{{ msg }}
        </div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="form-group">
        <label class="form-label">Correo electrónico registrado</label>
        <input type="email" name="email" class="form-control" required
               placeholder="tu@correo.com">
        <span class="form-hint">Te enviaremos un enlace para restablecer tu contraseña.</span>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="justify-content:center;padding:12px">
        <i class="ti ti-send"></i> Enviar enlace de recuperación
      </button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:13px">
      <a href="{{ url_for('auth.login') }}" style="color:var(--primary)">
        <i class="ti ti-arrow-left"></i> Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
</body>
</html>
