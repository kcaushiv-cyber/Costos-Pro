{% extends 'base.html' %}
{% block title %}Nuevo Modelo de Proceso{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('process_costs.index') }}">Proceso</a> / Nuevo{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Nuevo Modelo de Costos por Proceso</h1></div>
  <div class="page-actions">
    <a href="{{ url_for('process_costs.index') }}" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i> Volver
    </a>
  </div>
</div>

<div style="max-width:640px">
<div class="card">
  <div class="card-body">
    <form method="POST" action="{{ url_for('process_costs.new') }}">
      <div class="form-group">
        <label class="form-label">Nombre del modelo <span class="required">*</span></label>
        <input type="text" name="name" class="form-control" required
               placeholder="Ej: Proceso Tela Enero 2025">
      </div>
      <div class="form-group">
        <label class="form-label">Producto / descripción</label>
        <input type="text" name="product_name" class="form-control"
               placeholder="Ej: Camisa algodón talla M">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de modelo <span class="required">*</span>
          <span class="help-btn"
            data-help="Normal: el más básico, sin pérdidas ni agregados. Agregadas: se incorporan más unidades durante el proceso (UAg). Perdidas: hay merma o desperdicio normal (UP). PROTECHO: algunas unidades terminadas se quedan en el departamento y no se transfieren (UTNT)."
            data-help-title="Tipos de modelo">?</span>
        </label>
        {% for v, label, desc in model_types %}
        <div style="margin-bottom:10px">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);transition:border-color 0.15s"
                 onmouseover="this.style.borderColor='var(--primary)'"
                 onmouseout="this.style.borderColor='var(--border)'">
            <input type="radio" name="model_type" value="{{ v }}" required
                   {% if v == 'normal' %}checked{% endif %}
                   style="margin-top:3px;accent-color:var(--primary)">
            <div>
              <div style="font-size:13px;font-weight:600">{{ label }}</div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:2px">{{ desc }}</div>
            </div>
          </label>
        </div>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="ti ti-arrow-right"></i> Crear y definir departamentos
      </button>
    </form>
  </div>
</div>
</div>
{% endblock %}
