{% extends 'base.html' %}
{% block title %}Editar Objeto{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('cost_objects.index') }}">Objetos</a> / Editar{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Editar Objeto de Costo</h1><p class="page-subtitle">{{ obj.name }}</p></div>
  <div class="page-actions"><a href="{{ url_for('cost_objects.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:580px">
<div class="card"><div class="card-body">
  <form method="POST" action="{{ url_for('cost_objects.edit', oid=obj.id) }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Código <span class="required">*</span></label><input type="text" name="code" class="form-control" required value="{{ obj.code }}"></div>
      <div class="form-group"><label class="form-label">Producto vinculado</label>
        <select name="product_id" class="form-control">
          <option value="">Sin vincular</option>
          {% for p in products %}<option value="{{ p.id }}" {% if obj.product_id==p.id %}selected{% endif %}>{{ p.code }} — {{ p.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Nombre <span class="required">*</span></label><input type="text" name="name" class="form-control" required value="{{ obj.name }}"></div>
    <div class="form-group"><label class="form-label">Cantidad producida/mes</label><input type="number" name="quantity_month" class="form-control" step="0.001" min="0" value="{{ obj.quantity_month or 0 }}"></div>
    <div class="form-group">
      <label class="form-label">Costo unitario tradicional (S/)
        <span class="help-btn" data-help="Costo unitario que se obtiene con el método tradicional de costeo (sin distribuir gastos indirectos por inductores ABC). Se usa para comparar contra el costo ABC calculado." data-help-title="Costo tradicional">?</span>
      </label>
      <input type="number" name="unit_cost_traditional" class="form-control" step="0.0001" min="0" value="{{ obj.unit_cost_traditional or 0 }}">
      <span class="form-hint">Necesario para comparar el costo ABC contra el método tradicional en los resultados</span>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea name="notes" class="form-control" rows="2">{{ obj.notes or '' }}</textarea></div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar</button>
      <a href="{{ url_for('cost_objects.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div></div>
</div>
{% endblock %}
