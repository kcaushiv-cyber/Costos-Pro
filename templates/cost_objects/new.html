{% extends 'base.html' %}
{% block title %}Nuevo Objeto de Costo{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('cost_objects.index') }}">Objetos</a> / Nuevo{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Nuevo Objeto de Costo</h1></div>
  <div class="page-actions"><a href="{{ url_for('cost_objects.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:580px">
<div class="card"><div class="card-body">
  <form method="POST" action="{{ url_for('cost_objects.new') }}">
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Código <span class="required">*</span></label><input type="text" name="code" class="form-control" required placeholder="OC001"></div>
      <div class="form-group"><label class="form-label">Producto vinculado</label>
        <select name="product_id" class="form-control">
          <option value="">Sin vincular</option>
          {% for p in products %}<option value="{{ p.id }}">{{ p.code }} — {{ p.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Nombre del objeto <span class="required">*</span></label><input type="text" name="name" class="form-control" required placeholder="Ej: Camisa talla M"></div>
    <div class="form-group">
      <label class="form-label">Cantidad producida/mes
        <span class="help-btn" data-help="Unidades producidas en el período. Se usa para calcular el costo unitario ABC dividiendo el costo total entre esta cantidad." data-help-title="Cantidad">?</span>
      </label>
      <input type="number" name="quantity_month" class="form-control" step="0.001" min="0" value="0">
    </div>
    <div class="form-group">
      <label class="form-label">Costo unitario tradicional (S/)
        <span class="help-btn" data-help="Costo unitario que se obtiene con el método tradicional de costeo (sin distribuir gastos indirectos por inductores ABC). Se usa para comparar contra el costo ABC calculado." data-help-title="Costo tradicional">?</span>
      </label>
      <input type="number" name="unit_cost_traditional" class="form-control" step="0.0001" min="0" value="0">
      <span class="form-hint">Necesario para comparar el costo ABC contra el método tradicional en los resultados</span>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar</button>
      <a href="{{ url_for('cost_objects.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div></div>
</div>
{% endblock %}
