{% extends 'base.html' %}
{% block title %}Nueva Estructura{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('structures.index') }}">Estructuras</a> / Nueva{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Nueva Estructura de Costos</h1></div>
  <div class="page-actions"><a href="{{ url_for('structures.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:640px">
<div class="card">
  <div class="card-header"><span class="card-title"><i class="ti ti-chart-treemap" style="color:var(--primary)"></i> Datos de la estructura</span></div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('structures.new') }}">
      <div class="form-group"><label class="form-label">Nombre <span class="required">*</span></label><input type="text" name="name" class="form-control" required placeholder="Estructura Producto A - Enero 2025"></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Producto/Servicio</label><select name="product_id" class="form-control"><option value="">Sin producto</option>{% for p in products %}<option value="{{ p.id }}">{{ p.code }} — {{ p.name }}</option>{% endfor %}</select></div>
        <div class="form-group"><label class="form-label">Descripción libre</label><input type="text" name="product_service" class="form-control" placeholder="Ej: Camisa talla M"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Fecha</label><input type="date" name="structure_date" class="form-control"></div>
        <div class="form-group"><label class="form-label">Producción mensual (uds)</label><input type="number" name="monthly_production" class="form-control" step="0.01" min="0" value="0"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Precio de venta (S/)</label><input type="number" name="sale_price" class="form-control" step="0.01" min="0" value="0"></div>
        <div class="form-group"><label class="form-label">Margen deseado (%)</label><input type="number" name="desired_margin" class="form-control" step="0.1" min="0" value="0"></div>
      </div>
      <!-- Imagen -->
      <div class="form-group">
        <label class="form-label">Imagen del producto (opcional)</label>
        <div id="st-img-preview" style="display:none;margin-bottom:8px">
          <img id="st-img-thumb" src="" style="max-height:100px;border-radius:8px;border:1px solid var(--border)">
        </div>
        <input type="file" id="st-img-file" accept="image/*" style="display:none"
               onchange="uploadImg('st-img-file','st-img-preview','st-img-thumb','st-image-path')">
        <input type="hidden" name="image_path" id="st-image-path">
        <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('st-img-file').click()">
          <i class="ti ti-photo"></i> Seleccionar imagen
        </button>
      </div>
      <button type="submit" class="btn btn-primary"><i class="ti ti-plus"></i> Crear estructura</button>
    </form>
  </div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/upload_img.js') }}"></script>
{% endblock %}
