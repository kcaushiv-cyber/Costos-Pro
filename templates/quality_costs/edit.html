{% extends 'base.html' %}
{% block title %}Editar Actividad{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('quality_costs.index') }}">Calidad</a> / Editar{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Editar Actividad de Calidad</h1><p class="page-subtitle">{{ cost.activity_name }}</p></div>
  <div class="page-actions"><a href="{{ url_for('quality_costs.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:600px">
<div class="card"><div class="card-body">
  <form method="POST" action="{{ url_for('quality_costs.edit', qid=cost.id) }}">
    <div class="form-group">
      <label class="form-label">Nombre <span class="required">*</span></label>
      <input type="text" name="activity_name" class="form-control" required value="{{ cost.activity_name }}">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea name="description" class="form-control" rows="2">{{ cost.description or '' }}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Categoría PAF <span class="required">*</span></label>
      {% for v, label, desc in categories %}
      <div style="margin-bottom:8px">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md)">
          <input type="radio" name="category" value="{{ v }}" {% if cost.category == v %}checked{% endif %} required style="margin-top:2px;accent-color:var(--primary)">
          <div><div style="font-size:13px;font-weight:600">{{ label }}</div><div style="font-size:12px;color:var(--text-secondary)">{{ desc }}</div></div>
        </label>
      </div>
      {% endfor %}
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Costo mensual (S/) <span class="required">*</span></label>
        <input type="number" name="monthly_cost" class="form-control" step="0.01" min="0" value="{{ cost.monthly_cost }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Responsable</label>
        <input type="text" name="responsible" class="form-control" value="{{ cost.responsible or '' }}">
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar cambios</button>
      <a href="{{ url_for('quality_costs.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div></div>
</div>
{% endblock %}
