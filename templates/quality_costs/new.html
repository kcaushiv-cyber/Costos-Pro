{% extends 'base.html' %}
{% block title %}Nueva Actividad de Calidad{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('quality_costs.index') }}">Calidad</a> / Nueva{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Nueva Actividad de Calidad</h1></div>
  <div class="page-actions"><a href="{{ url_for('quality_costs.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:600px">
<div class="card"><div class="card-body">
  <form method="POST" action="{{ url_for('quality_costs.new') }}">
    <div class="form-group">
      <label class="form-label">Nombre de la actividad <span class="required">*</span></label>
      <input type="text" name="activity_name" class="form-control" required
             placeholder="Ej: Capacitación en técnicas de inspección">
    </div>
    <div class="form-group">
      <label class="form-label">Descripción</label>
      <textarea name="description" class="form-control" rows="2"
                placeholder="Descripción adicional de la actividad..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Categoría PAF <span class="required">*</span>
        <span class="help-btn"
          data-help="Prevención: actividades para evitar defectos (capacitación, diseño de calidad, mantenimiento preventivo). Evaluación: inspección y medición (auditorías, laboratorios, pruebas). Falla Interna: defectos antes de entregar (reprocesos, desperdicios, tiempo muerto). Falla Externa: defectos detectados por el cliente (garantías, devoluciones, penalidades)."
          data-help-title="Categorías PAF">?</span>
      </label>
      {% for v, label, desc in categories %}
      <div style="margin-bottom:8px">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md)">
          <input type="radio" name="category" value="{{ v }}" required
                 {% if v == 'prevencion' %}checked{% endif %}
                 style="margin-top:2px;accent-color:var(--primary)">
          <div>
            <div style="font-size:13px;font-weight:600">{{ label }}</div>
            <div style="font-size:12px;color:var(--text-secondary)">{{ desc }}</div>
          </div>
        </label>
      </div>
      {% endfor %}
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Costo mensual (S/) <span class="required">*</span></label>
        <input type="number" name="monthly_cost" class="form-control" step="0.01" min="0" value="0" required>
      </div>
      <div class="form-group">
        <label class="form-label">Responsable</label>
        <input type="text" name="responsible" class="form-control" placeholder="Ej: Jefe de Calidad">
      </div>
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar</button>
      <a href="{{ url_for('quality_costs.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div></div>
</div>
{% endblock %}
