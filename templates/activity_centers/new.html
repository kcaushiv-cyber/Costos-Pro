{% extends 'base.html' %}
{% block title %}Nuevo Centro{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('activity_centers.index') }}">Centros</a> / Nuevo{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1 class="page-title">Nuevo Centro de Actividad</h1></div>
  <div class="page-actions"><a href="{{ url_for('activity_centers.index') }}" class="btn btn-secondary"><i class="ti ti-arrow-left"></i> Volver</a></div>
</div>
<div style="max-width:580px">
<div class="card"><div class="card-body">
  <form method="POST" action="{{ url_for('activity_centers.new') }}">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Código <span class="required">*</span></label>
        <input type="text" name="code" class="form-control" required placeholder="CA01" maxlength="15">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo <span class="required">*</span>
          <span class="help-btn" data-help="Estratégico: dirección y gerencia. Operativo: producción, operaciones directas. Apoyo: RRHH, contabilidad, IT, mantenimiento." data-help-title="Tipo de centro">?</span>
        </label>
        <select name="center_type" class="form-control" required>
          {% for v,l in center_types %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre <span class="required">*</span></label>
      <input type="text" name="name" class="form-control" required placeholder="Ej: Centro de Producción Principal">
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Costo mensual</label>
        <input type="number" name="total_cost_monthly" class="form-control" step="0.01" min="0" value="0" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Costo anual</label>
        <input type="number" name="total_cost_annual" class="form-control" step="0.01" min="0" value="0" placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea name="notes" class="form-control" rows="2" placeholder="Descripción, responsable, observaciones..."></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Guardar</button>
      <a href="{{ url_for('activity_centers.index') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div></div>
</div>
{% endblock %}
