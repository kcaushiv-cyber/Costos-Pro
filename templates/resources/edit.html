{% extends 'base.html' %}
{% block title %}Editar Recurso{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('resources.index') }}">Recursos</a> / Editar{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Recurso</h1>
    <p class="page-subtitle">{{ resource.name }}</p>
  </div>
  <div class="page-actions">
    <a href="{{ url_for('resources.index') }}" class="btn btn-secondary">
      <i class="ti ti-arrow-left"></i> Volver
    </a>
  </div>
</div>

<div style="max-width:640px">
  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('resources.edit', rid=resource.id) }}">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Código <span class="required">*</span></label>
            <input type="text" name="code" class="form-control" required value="{{ resource.code }}">
          </div>
          <div class="form-group">
            <label class="form-label">Categoría</label>
            <input type="text" name="category" class="form-control"
                   list="cat-list-edit" autocomplete="off"
                   value="{{ resource.category or '' }}">
            <datalist id="cat-list-edit">
              {% for v, l in categories %}
                <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </datalist>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nombre <span class="required">*</span></label>
          <input type="text" name="name" class="form-control" required value="{{ resource.name }}">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Monto mensual (S/) <span class="required">*</span></label>
            <input type="number" name="monthly_amount" class="form-control"
                   step="0.01" min="0" required value="{{ resource.monthly_amount }}">
          </div>
          <div class="form-group">
            <label class="form-label">Tipo de inductor</label>
            <select name="driver_type" class="form-control">
              <option value="">Sin inductor</option>
              {% for v, l in [('kwh','Kw-h'),('horas_hombre','Horas hombre'),('horas_maquina','Horas máquina'),('m2','M²'),('m3','M³'),('unidades','Unidades'),('porcentaje','Porcentaje'),('otro','Otro')] %}
                <option value="{{ v }}" {% if resource.driver_type == v %}selected{% endif %}>{{ l }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <textarea name="notes" class="form-control" rows="2">{{ resource.notes or '' }}</textarea>
        </div>
        <div style="display:flex;gap:10px">
          <button type="submit" class="btn btn-primary">
            <i class="ti ti-device-floppy"></i> Guardar cambios
          </button>
          <a href="{{ url_for('resources.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
